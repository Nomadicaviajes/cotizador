<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cotizador Nomádica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0ebe2;color:#222;font-size:14px}
:root{--brand:#1b3a5c;--accent:#c8881a;--border:#d4cfc6;--radius:10px;--green:#1a6e35}
.app{max-width:960px;margin:0 auto;padding:14px}

/* HEADER */
header{background:var(--brand);border-radius:var(--radius);margin-bottom:14px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
header img{height:44px;object-fit:contain}
.hdr-right{text-align:right;color:rgba(255,255,255,.75);font-size:11px;line-height:1.7}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#555}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* CARDS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--brand)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px}
@media(max-width:580px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}

/* FIELDS */
.f{display:flex;flex-direction:column;gap:3px}
.f label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:Arial,sans-serif;background:#fff;color:#222}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);border-color:transparent}
input[readonly]{background:#f0ebe2;color:#555}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;font-size:12px;font-weight:700;font-family:Arial,sans-serif}
.btn-primary{background:var(--brand);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:#fff;border-color:var(--border);color:#444}
.btn-green{background:#fff;border-color:#1a8c3e;color:#1a6e35}
.btn-danger{background:#fff0f0;border-color:#fcc;color:#c33}
.btn-sm{padding:4px 9px;font-size:11px}

/* SERVICE BLOCKS */
.sblock{border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:9px;background:#faf8f4}
.sblock-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sblock-title{font-size:12px;font-weight:700;color:var(--brand)}
.rm-btn{background:none;border:none;cursor:pointer;color:#c33;font-size:16px;line-height:1;padding:0 4px}

/* RESULT BOXES */
.rbox{background:#eaf2fb;border:1px solid #bed4ea;border-radius:7px;padding:9px 11px;margin-top:8px}
.rrow{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.rrow:last-child{border-bottom:none}
.rrow.rtotal{font-weight:700;font-size:14px;border-top:1px solid #bed4ea;margin-top:3px;padding-top:5px}
.rrow.rprofit{color:var(--green);font-weight:700}
.rrow.rtransfer{color:#555;font-style:italic}

/* SUMMARY */
.sh-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.sh-hdr{background:var(--brand);color:#fff;padding:8px 13px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.sh-hdr span{background:var(--accent);font-size:11px;padding:2px 8px;border-radius:10px}
.srow{display:flex;justify-content:space-between;padding:6px 13px;font-size:13px;border-bottom:1px solid #f0ece6}
.srow:last-child{border-bottom:none}
.srow.stotal{background:#f5f0e8;font-weight:700}
.srow.stransfer{background:#fdf8f0;color:#7a5010;font-size:12px}
.srow.sprofit{background:#eaf5ee;color:var(--green);font-weight:700}
.srow.sdiscount{color:#c33}

/* IMAGE UPLOAD */
.img-drop{border:2px dashed var(--border);border-radius:7px;padding:14px;text-align:center;color:#999;font-size:12px;cursor:pointer;position:relative;margin-top:7px}
.img-drop:hover{border-color:var(--brand);background:#eaf2fb;color:var(--brand)}
.img-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-prev{width:100%;border-radius:6px;margin-top:7px;border:1px solid var(--border);display:none}

/* HISTORY */
.hist-item{border:1px solid var(--border);border-radius:8px;padding:9px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;background:#fff;cursor:pointer}
.hist-item:hover{border-color:var(--brand);background:#eaf2fb}

/* MODAL */
#waModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center}
#waModal.open{display:flex}
.wa-box{background:#fff;border-radius:12px;padding:18px;width:95%;max-width:580px;max-height:88vh;display:flex;flex-direction:column;gap:10px}
.wa-box textarea{font-size:12px;font-family:monospace;resize:vertical;border:1px solid var(--border);border-radius:7px;padding:9px;line-height:1.65;flex:1;min-height:300px}
</style>
</head>
<body>
<div class="app">

<header>
  <img src="https://static.wixstatic.com/media/5628a8_ac0bbf27db104ec1aac1230b28852e1b~mv2.png"
       alt="Nomádica Viajes"
       onerror="this.outerHTML='<div style=\'color:#fff;font-size:20px;font-weight:900;letter-spacing:3px\'>NOMÁDICA<div style=\'font-size:9px;color:#c8881a;letter-spacing:4px;margin-top:-2px\'>VIAJES</div></div>'">
  <div class="hdr-right" id="hdrInfo">Internacional · USD<br>nomadicaviajes.com.ar</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('cotizar')">&#9998; Cotizar</button>
  <button class="tab" onclick="showTab('resumen')">&#128202; Resumen</button>
  <button class="tab" onclick="showTab('historial')">&#128337; Historial</button>
</div>

<!-- ===== TAB COTIZAR ===== -->
<div id="tab-cotizar">

  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#128205; Datos del viaje</div>
      <div style="display:flex;gap:7px;align-items:center">
        <label style="font-size:11px;font-weight:700;color:#666">TIPO:</label>
        <select id="tipoViaje" style="width:auto" onchange="updateTipo()">
          <option value="int">Internacional (USD)</option>
          <option value="nac">Nacional (ARS)</option>
        </select>
      </div>
    </div>
    <div class="g3">
      <div class="f"><label>Cliente</label><input id="cliente" type="text" placeholder="Nombre del cliente"></div>
      <div class="f"><label>Destino</label><input id="destino" type="text" placeholder="Destino"></div>
      <div class="f"><label>Vendedor</label><input id="vendedor" type="text" placeholder="Nombre del vendedor"></div>
      <div class="f"><label>Fecha salida</label><input id="fechaSalida" type="date"></div>
      <div class="f"><label>Fecha regreso</label><input id="fechaRegreso" type="date"></div>
      <div class="f"><label>Noches</label><input id="noches" type="text" readonly></div>
    </div>
    <div class="g4" style="margin-top:9px">
      <div class="f"><label>Adultos (+12)</label><input id="adultos" type="number" min="0" value="2"></div>
      <div class="f"><label>Ninos (2-11)</label><input id="ninos" type="number" min="0" value="0"></div>
      <div class="f"><label>Infantes (-2)</label><input id="infantes" type="number" min="0" value="0"></div>
      <div class="f"><label>Total pax</label><input id="totalPax" type="text" readonly></div>
    </div>
  </div>

  <!-- AÉREOS -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#9992; Aéreos</div>
      <label style="font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px">
        <input type="checkbox" id="chkAereo"> Incluir
      </label>
    </div>
    <div id="aereoFields" style="display:none">
      <div class="g3">
        <div class="f"><label>Aerolinea</label><input id="aerolinea" type="text" placeholder="Ej: LATAM Airlines"></div>
        <div class="f"><label>Costo total (<span class="mL">USD</span>)</label><input id="aereoNeto" type="number" min="0" placeholder="0" step="0.01"></div>
        <div class="f"><label>Margen de ganancia</label><select id="aereoMargen"></select></div>
      </div>
      <div class="f" style="margin-top:8px"><label>Detalle del vuelo</label>
        <textarea id="aereoDetalle" rows="2" placeholder="Ej: GRU - BUE, horarios, equipaje incluido..."></textarea>
      </div>
      <div style="margin-top:8px">
        <label style="font-size:11px;font-weight:700;color:#666">IMAGEN DEL ITINERARIO (captura de pantalla)</label>
        <div class="img-drop" id="aereoDropArea">
          <input type="file" accept="image/*" onchange="loadImgFile(event)">
          [foto] Clic para seleccionar · arrastra · o pega con Ctrl+V / Cmd+V
        </div>
        <img id="aereoImgPrev" class="img-prev">
        <button id="aereoImgClear" class="btn btn-danger btn-sm" style="display:none;margin-top:5px" onclick="clearImg()">X Quitar imagen</button>
      </div>
      <div id="aereoResult" class="rbox" style="display:none;margin-top:9px"></div>
    </div>
  </div>

  <!-- TRASLADOS -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#128652; Traslados</div>
      <button class="btn btn-ghost btn-sm" onclick="addTraslado()">+ Agregar</button>
    </div>
    <div id="trasladosWrap"></div>
  </div>

  <!-- HOTELES -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#127970; Hoteles</div>
      <button class="btn btn-ghost btn-sm" onclick="addHotel()">+ Agregar opción</button>
    </div>
    <div id="hotelesWrap"></div>
  </div>

  <!-- ASISTENCIA -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#128138; Asistencia al viajero</div>
      <label style="font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px">
        <input type="checkbox" id="chkAsist"> Incluir
      </label>
    </div>
    <div id="asistFields" style="display:none">
      <div class="g3">
        <div class="f"><label>Empresa</label>
          <select id="asistEmpresa">
            <option value="0.38">Universal Assistance (38%)</option>
            <option value="0.30">Coris (30%)</option>
            <option value="0.23">Assist Card (23%)</option>
          </select>
        </div>
        <div class="f"><label>Tarifa total (<span class="mL">USD</span>)</label><input id="asistTarifa" type="number" min="0" placeholder="0" step="0.01"></div>
        <div class="f"><label>Cobertura</label><input id="asistCob" type="text" placeholder="Ej: hasta USD 30.000"></div>
      </div>
      <div id="asistResult" class="rbox" style="display:none;margin-top:8px"></div>
    </div>
  </div>

  <!-- SERVICIOS ADICIONALES -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#10010; Servicios adicionales</div>
      <button class="btn btn-ghost btn-sm" onclick="addServicio()">+ Agregar</button>
    </div>
    <div id="serviciosWrap"></div>
  </div>

  <!-- DESCUENTO -->
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#127991; Descuento</div>
      <label style="font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px">
        <input type="checkbox" id="chkDesc"> Incluir
      </label>
    </div>
    <div id="descFields" style="display:none">
      <div class="g2">
        <div class="f"><label>Detalle</label><input id="descDetalle" type="text" placeholder="Ej: Promo Early Bird"></div>
        <div class="f"><label>Monto (<span class="mL">USD</span>)</label><input id="descMonto" type="number" min="0" placeholder="0" step="0.01"></div>
      </div>
    </div>
  </div>

  <!-- GASTOS RESERVA -->
  <div class="card">
    <div class="card-hdr"><div class="card-title">&#128221; Gastos de reserva</div></div>
    <div class="g2">
      <div class="f"><label>% sobre servicios terrestres (neto de comision)</label>
        <select id="gastosReserva">
          <option value="2">2%</option><option value="3">3%</option>
          <option value="4" selected>4%</option><option value="5">5%</option><option value="6">6%</option>
        </select>
      </div>
      <div class="f"><label>Monto calculado</label><input id="gastosCalc" readonly></div>
    </div>
  </div>

  <div style="display:flex;gap:9px;justify-content:flex-end;margin-top:4px">
    <button class="btn btn-ghost" onclick="limpiar()">Limpiar todo</button>
    <button class="btn btn-ghost" onclick="showTab('resumen')">Ver resumen</button>
    <button class="btn btn-primary" onclick="guardar()">Guardar cotizacion</button>
  </div>
</div>

<!-- ===== TAB RESUMEN ===== -->
<div id="tab-resumen" style="display:none">
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#128202; Resumen de cotizacion</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-green" onclick="generarWA()">WhatsApp</button>
        <button class="btn btn-accent" onclick="generarPDF()">Descargar PDF</button>
      </div>
    </div>
    <div id="resumenContent"></div>
  </div>
</div>

<!-- ===== TAB HISTORIAL ===== -->
<div id="tab-historial" style="display:none">
  <div class="card">
    <div class="card-hdr">
      <div class="card-title">&#128337; Historial</div>
      <span id="histCount" style="font-size:11px;color:#999"></span>
    </div>
    <div id="histList"></div>
  </div>
</div>

</div><!-- /app -->

<!-- WHATSAPP MODAL -->
<div id="waModal">
  <div class="wa-box">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:700;color:var(--brand);font-size:14px">Texto para WhatsApp</span>
      <button onclick="closeWA()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888">&times;</button>
    </div>
    <textarea id="waText"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeWA()">Cerrar</button>
      <button class="btn btn-accent" onclick="copyWA()" id="copyBtn">Copiar texto</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────
var MON = 'USD';
var tIdx=0, hIdx=0, sIdx=0;
var traslados=[], hoteles=[], servicios=[];
var aereoImgData = null;

// ─── HELPERS ─────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function val(id){ return parseFloat($(id).value)||0; }
function fmt(n){ return (Math.round((+n||0)*100)/100).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:2}); }

function margenSel(selId, def){
  var s='<option value="0">Sin margen</option>';
  for(var i=1;i<=20;i++) s+='<option value="'+i+'"'+(i===def?' selected':'')+'>'+i+'%</option>';
  $(selId).innerHTML=s;
}
function comSel(selId, def){
  var s='';
  for(var i=10;i<=20;i++) s+='<option value="'+i+'"'+(i===(def||15)?' selected':'')+'>'+i+'%</option>';
  $(selId).innerHTML=s;
}

// ─── TIPO ─────────────────────────────────────────────
function updateTipo(){
  MON = $('tipoViaje').value==='nac' ? 'ARS' : 'USD';
  $('hdrInfo').innerHTML = (MON==='USD'?'Internacional · USD':'Nacional · ARS')+'<br>nomadicaviajes.com.ar';
  document.querySelectorAll('.mL').forEach(function(el){ el.textContent=MON; });
  recalc();
}

// ─── PAX & NOCHES ────────────────────────────────────
function updatePax(){
  var a=parseInt($('adultos').value)||0;
  var n=parseInt($('ninos').value)||0;
  var i=parseInt($('infantes').value)||0;
  $('totalPax').value = a+n+i;
}
function updateNoches(){
  var s=$('fechaSalida').value, r=$('fechaRegreso').value;
  if(s&&r){
    var diff=Math.round((new Date(r)-new Date(s))/(864e5));
    $('noches').value = diff>0 ? diff : 0;
  } else {
    $('noches').value='';
  }
}

// ─── IMAGE ───────────────────────────────────────────
function loadImgFile(e){
  var file=e.target.files[0]; if(!file) return;
  var rd=new FileReader();
  rd.onload=function(ev){ aereoImgData=ev.target.result; showImg(); };
  rd.readAsDataURL(file);
}
function showImg(){
  $('aereoImgPrev').src=aereoImgData; $('aereoImgPrev').style.display='block';
  $('aereoImgClear').style.display='inline-flex'; $('aereoDropArea').style.display='none';
}
function clearImg(){
  aereoImgData=null; $('aereoImgPrev').style.display='none';
  $('aereoImgClear').style.display='none'; $('aereoDropArea').style.display='block';
}
document.addEventListener('paste',function(e){
  if(!$('chkAereo').checked) return;
  var items=[].slice.call(e.clipboardData&&e.clipboardData.items||[]);
  var img=items.find(function(i){return i.type.startsWith('image');});
  if(!img) return;
  var rd=new FileReader(); rd.onload=function(ev){aereoImgData=ev.target.result;showImg();};
  rd.readAsDataURL(img.getAsFile());
});

// ─── TRASLADOS ───────────────────────────────────────
function addTraslado(){
  var id=++tIdx; traslados.push(id);
  var div=document.createElement('div');
  div.className='sblock'; div.id='T'+id;
  div.innerHTML='<div class="sblock-hdr"><span class="sblock-title">Traslado #'+id+'</span>'
    +'<button class="rm-btn" onclick="removeT('+id+')">&#x2715;</button></div>'
    +'<div class="g4">'
    +'<div class="f"><label>Tipo</label><select id="tTipo'+id+'"><option>IN</option><option>OUT</option><option>IN - OUT</option></select></div>'
    +'<div class="f"><label>Proveedor</label><input id="tProv'+id+'" type="text" placeholder="Proveedor"></div>'
    +'<div class="f"><label>Tarifa por pax (<span class="mL">'+MON+'</span>)</label><input id="tTar'+id+'" type="number" min="0" placeholder="0" step="0.01"></div>'
    +'<div class="f"><label>Comision</label><select id="tCom'+id+'"></select></div>'
    +'</div>'
    +'<div id="tRes'+id+'" class="rbox" style="display:none;margin-top:8px"></div>';
  $('trasladosWrap').appendChild(div);
  comSel('tCom'+id,15);
}
function removeT(id){ traslados=traslados.filter(function(x){return x!==id;}); $('T'+id).remove(); recalc(); }

// ─── HOTELES ─────────────────────────────────────────
function addHotel(){
  var id=++hIdx; hoteles.push(id);
  var div=document.createElement('div');
  div.className='sblock'; div.id='H'+id;
  div.innerHTML='<div class="sblock-hdr"><span class="sblock-title">Hotel opcion #'+id+'</span>'
    +'<button class="rm-btn" onclick="removeH('+id+')">&#x2715;</button></div>'
    +'<div class="g3">'
    +'<div class="f"><label>Nombre</label><input id="hNom'+id+'" type="text" placeholder="Nombre del hotel"></div>'
    +'<div class="f"><label>Regimen</label><select id="hReg'+id+'">'
    +'<option>Solo alojamiento</option><option>Desayuno incluido</option>'
    +'<option>Media pension</option><option>Pension completa</option><option>All Inclusive</option>'
    +'</select></div>'
    +'<div class="f"><label>Categoria habitacion</label><input id="hCat'+id+'" type="text" placeholder="Ej: Junior Suite, Vista Mar..."></div>'
    +'<div class="f"><label>Habitaciones</label><input id="hHabs'+id+'" type="number" min="1" value="1"></div>'
    +'<div class="f"><label>Tarifa total (<span class="mL">'+MON+'</span>)</label><input id="hTar'+id+'" type="number" min="0" placeholder="0" step="0.01"></div>'
    +'<div class="f"><label>Comision</label><select id="hCom'+id+'"></select></div>'
    +'<div class="f" style="grid-column:span 3"><label>Link del hotel</label><input id="hLink'+id+'" type="text" placeholder="https://..."></div>'
    +'</div>'
    +'<div id="hRes'+id+'" class="rbox" style="display:none;margin-top:8px"></div>';
  $('hotelesWrap').appendChild(div);
  comSel('hCom'+id,15);
}
function removeH(id){ hoteles=hoteles.filter(function(x){return x!==id;}); $('H'+id).remove(); recalc(); }

// ─── SERVICIOS ───────────────────────────────────────
function addServicio(){
  var id=++sIdx; servicios.push(id);
  var div=document.createElement('div');
  div.className='sblock'; div.id='S'+id;
  div.innerHTML='<div class="sblock-hdr"><span class="sblock-title">Servicio adicional #'+id+'</span>'
    +'<button class="rm-btn" onclick="removeS('+id+')">&#x2715;</button></div>'
    +'<div class="g4">'
    +'<div class="f"><label>Tipo</label><select id="sTipo'+id+'">'
    +'<option value="autos">Autos</option><option value="circuitos">Circuitos</option>'
    +'<option value="visa">Visa</option><option value="excursiones">Excursiones</option>'
    +'<option value="otros">Otros</option></select></div>'
    +'<div class="f"><label>Descripcion</label><input id="sDesc'+id+'" type="text" placeholder="Detalle"></div>'
    +'<div class="f"><label>Tarifa (<span class="mL">'+MON+'</span>)</label><input id="sTar'+id+'" type="number" min="0" placeholder="0" step="0.01"></div>'
    +'<div class="f"><label>Tipo tarifa</label><select id="sTT'+id+'" onchange="refreshSExtra('+id+')">'
    +'<option value="com">Comisionable</option><option value="neto">Neto (margen)</option></select></div>'
    +'</div>'

// ─── RECALC ──────────────────────────────────────────
function recalc(){
  updatePax();
  updateNoches();
  var mon=MON;
  var a=parseInt($('adultos').value)||0;
  var n=parseInt($('ninos').value)||0;
  var inf=parseInt($('infantes').value)||0;
  var paxTotal=a+n+inf;
  var paxPag=a+n; // pagantes (sin infantes) para traslados

  // AÉREO
  var aerFin=0, aerGan=0;
  if($('chkAereo').checked){
    var aerNeto=val('aereoNeto');
    var aerMrg=val('aereoMargen')/100;
    aerGan=aerNeto*aerMrg; aerFin=aerNeto+aerGan;
    $('aereoResult').style.display='block';
    $('aereoResult').innerHTML=
      '<div class="rrow"><span>Costo neto</span><span>'+mon+' '+fmt(aerNeto)+'</span></div>'
      +'<div class="rrow rprofit"><span>Margen ('+Math.round(aerMrg*100)+'%)</span><span>'+mon+' '+fmt(aerGan)+'</span></div>'
      +'<div class="rrow rtotal"><span>Precio final</span><span>'+mon+' '+fmt(aerFin)+'</span></div>';
  }

  // TRASLADOS
  var trasFin=0, trasCom=0;
  traslados.forEach(function(id){
    var tar=val('tTar'+id);
    var com=val('tCom'+id)/100;
    var sub=tar*paxPag;
    var comM=sub*com;
    trasFin+=sub; trasCom+=comM;
    var r=$('tRes'+id); if(!r) return;
    r.style.display='block';
    r.innerHTML='<div class="rrow"><span>Pax pagantes (sin infantes)</span><span>'+paxPag+'</span></div>'
      +'<div class="rrow"><span>Subtotal</span><span>'+mon+' '+fmt(sub)+'</span></div>'
      +'<div class="rrow rprofit"><span>Comision ('+Math.round(com*100)+'%)</span><span>'+mon+' '+fmt(comM)+'</span></div>';
  });

  // HOTELES (solo muestra comision)
  hoteles.forEach(function(id){
    var tar=val('hTar'+id);
    var com=val('hCom'+id)/100;
    var r=$('hRes'+id); if(!r) return;
    r.style.display='block';
    r.innerHTML='<div class="rrow"><span>Tarifa total</span><span>'+mon+' '+fmt(tar)+'</span></div>'
      +'<div class="rrow rprofit"><span>Comision ('+Math.round(com*100)+'%)</span><span>'+mon+' '+fmt(tar*com)+'</span></div>';
  });

  // ASISTENCIA
  var asistFin=0, asistCom=0;
  if($('chkAsist').checked){
    var atar=val('asistTarifa');
    var acom=val('asistEmpresa');
    asistFin=atar; asistCom=atar*acom;
    $('asistResult').style.display='block';
    $('asistResult').innerHTML='<div class="rrow"><span>Tarifa total</span><span>'+mon+' '+fmt(atar)+'</span></div>'
      +'<div class="rrow rprofit"><span>Comision ('+Math.round(acom*100)+'%)</span><span>'+mon+' '+fmt(asistCom)+'</span></div>';
  }

  // SERVICIOS ADICIONALES
  var servFin=0, servGan=0;
  servicios.forEach(function(id){
    var tipo=$('sTipo'+id)&&$('sTipo'+id).value;
    var tt=$('sTT'+id)&&$('sTT'+id).value;
    var tar=val('sTar'+id);
    var pct=val('sCom'+id)/100;
    var porPax=['circuitos','visa','excursiones'].indexOf(tipo)>=0;
    var base=porPax?tar*paxTotal:tar;
    var gan=base*pct;
    var fin=tt==='neto'?base*(1+pct):base;
    servFin+=fin; servGan+=gan;
    var r=$('sRes'+id); if(!r) return;
    r.style.display='block';
    r.innerHTML='<div class="rrow"><span>Base'+(porPax?' x '+paxTotal+' pax':'')+'</span><span>'+mon+' '+fmt(base)+'</span></div>'
      +'<div class="rrow rprofit"><span>'+(tt==='com'?'Comision':'Margen')+' ('+Math.round(pct*100)+'%)</span><span>'+mon+' '+fmt(gan)+'</span></div>'
      +(tt==='neto'?'<div class="rrow rtotal"><span>Precio final</span><span>'+mon+' '+fmt(fin)+'</span></div>':'');
  });

  // GASTOS DE RESERVA
  var pctGR=val('gastosReserva')/100;
  var baseTerr=trasFin-trasCom;
  hoteles.forEach(function(id){
    var tar=val('hTar'+id); var com=val('hCom'+id)/100;
    baseTerr+=tar-tar*com;
  });
  servicios.forEach(function(id){
    if($('sTT'+id)&&$('sTT'+id).value==='com'){
      var tipo=$('sTipo'+id)&&$('sTipo'+id).value;
      var tar=val('sTar'+id); var com=val('sCom'+id)/100;
      var porPax=['circuitos','visa','excursiones'].indexOf(tipo)>=0;
      var base=porPax?tar*paxTotal:tar;
      baseTerr+=base-base*com;
    }
  });
  var gr=baseTerr*pctGR;
  $('gastosCalc').value=mon+' '+fmt(gr);

  var desc=$('chkDesc').checked?val('descMonto'):0;

  window._C={aerFin,aerGan,trasFin,trasCom,asistFin,asistCom,servFin,servGan,gr,desc,
    paxTotal,paxPag,infantes:inf,adultos:a,ninos:n,mon};
}

function hTotal(hid){
  var C=window._C||{};
  var tar=val('hTar'+hid);
  var com=val('hCom'+hid)/100;
  var hCom=tar*com;
  var tot=(C.aerFin||0)+(C.trasFin||0)+tar+(C.asistFin||0)+(C.servFin||0)+(C.gr||0)-(C.desc||0);
  var gan=(C.aerGan||0)+(C.trasCom||0)+hCom+(C.asistCom||0)+(C.servGan||0)-(C.gr||0);
  var pp=C.paxTotal>0?tot/C.paxTotal:0;
  return {tot,gan,pp,totT:tot*1.015,ppT:pp*1.015};
}

    traslados.forEach(function(tid){
      var tipo=$('tTipo'+tid)&&$('tTipo'+tid).value;
      var prov=$('tProv'+tid)&&$('tProv'+tid).value||'Traslado';
      var sub=val('tTar'+tid)*C.paxPag;
      rows+='<div class="srow"><span>Traslado '+tipo+' · '+prov+'</span><span>'+mon+' '+fmt(sub)+'</span></div>';

    rows+='<div class="srow"><span>'+nom+'</span><span>'+mon+' '+fmt(val('hTar'+hid))+'</span></div>';
    if($('chkAsist').checked){
      var emp=$('asistEmpresa'); var en=emp.options[emp.selectedIndex].text.split('(')[0].trim();
      rows+='<div class="srow"><span>'+en+'</span><span>'+mon+' '+fmt(C.asistFin)+'</span></div>';
    }
    servicios.forEach(function(sid){
      var desc=$('sDesc'+sid)&&$('sDesc'+sid).value||$('sTipo'+sid)&&$('sTipo'+sid).value;
      var tipo=$('sTipo'+sid)&&$('sTipo'+sid).value;

      var porPax=['circuitos','visa','excursiones'].indexOf(tipo)>=0;
      var base=porPax?tar*C.paxTotal:tar;
      var fin=tt==='neto'?base*(1+pct):base;
      rows+='<div class="srow"><span>'+desc+'</span><span>'+mon+' '+fmt(fin)+'</span></div>';
    });
    rows+='<div class="srow"><span>Gastos de reserva ('+$('gastosReserva').value+'%)</span><span>'+mon+' '+fmt(C.gr)+'</span></div>';
    if(C.desc>0){
      var det=$('descDetalle').value||'Descuento';
      rows+='<div class="srow sdiscount"><span>'+det+'</span><span>- '+mon+' '+fmt(C.desc)+'</span></div>';
    }
    return '<div class="sh-card">'
      +'<div class="sh-hdr">'+nom+' <span>'+reg+'</span></div>'
      +rows
      +'<div class="srow stotal"><span>Total grupo · Efectivo ('+C.paxTotal+' pax)</span><span>'+mon+' '+fmt(h.tot)+'</span></div>'
      +'<div class="srow stransfer"><span>Total grupo · Transferencia (+1.5%)</span><span>'+mon+' '+fmt(h.totT)+'</span></div>'
      +'<div class="srow stotal"><span>Total por persona · Efectivo</span><span>'+mon+' '+fmt(h.pp)+'</span></div>'
      +'<div class="srow stransfer"><span>Total por persona · Transferencia (+1.5%)</span><span>'+mon+' '+fmt(h.ppT)+'</span></div>'
      +'<div class="srow sprofit"><span>Rentabilidad estimada</span><span>'+mon+' '+fmt(h.gan)+'</span></div>'
      +'</div>';
  }

  if(hoteles.length===0){
    var tot=(C.aerFin||0)+(C.trasFin||0)+(C.asistFin||0)+(C.servFin||0)+(C.gr||0)-(C.desc||0);
    var gan=(C.aerGan||0)+(C.trasCom||0)+(C.asistCom||0)+(C.servGan||0)-(C.gr||0);
    var pp=C.paxTotal>0?tot/C.paxTotal:0;
    html+='<div class="sh-card"><div class="sh-hdr">Resumen general</div>'
      +'<div class="srow stotal"><span>Total grupo · Efectivo</span><span>'+mon+' '+fmt(tot)+'</span></div>'
      +'<div class="srow stransfer"><span>Total grupo · Transferencia (+1.5%)</span><span>'+mon+' '+fmt(tot*1.015)+'</span></div>'
      +'<div class="srow stotal"><span>Total por persona · Efectivo</span><span>'+mon+' '+fmt(pp)+'</span></div>'
      +'<div class="srow stransfer"><span>Total por persona · Transferencia (+1.5%)</span><span>'+mon+' '+fmt(pp*1.015)+'</span></div>'
      +'<div class="srow sprofit"><span>Rentabilidad estimada</span><span>'+mon+' '+fmt(gan)+'</span></div></div>';
  } else {
    hoteles.forEach(function(hid){ html+=hotelCard(hid); });

  return html;

// ─── GUARDAR ─────────────────────────────────────────
function guardar(){
  recalc();
  var c=$('cliente').value, d=$('destino').value;
  if(!c||!d){ alert('Completa al menos cliente y destino.'); return; }
  var hist=getHist();
  hist.unshift({id:Date.now(),fecha:new Date().toLocaleDateString('es-AR'),
    cliente:c,destino:d,tipo:$('tipoViaje').value,html:buildResumen()});
  if(hist.length>20) hist.pop();
  saveHist(hist);
  alert('Cotizacion guardada.');
}
function getHist(){ try{return JSON.parse(localStorage.getItem('nmd3')||'[]');}catch(e){return[];} }
function saveHist(h){ localStorage.setItem('nmd3',JSON.stringify(h)); }

function renderHist(){
  var hist=getHist();
  $('histCount').textContent=hist.length+' guardadas';
  if(!hist.length){ $('histList').innerHTML='<div style="text-align:center;padding:30px;color:#bbb">No hay cotizaciones guardadas</div>'; return; }
  $('histList').innerHTML=hist.map(function(h){
    return '<div class="hist-item">'
      +'<div onclick="verH('+h.id+')" style="flex:1">'
      +'<div style="font-weight:700;font-size:13px">'+h.cliente+' · '+h.destino+'</div>'
      +'<div style="font-size:11px;color:#999">'+h.fecha+' · '+(h.tipo==='nac'?'Nacional · ARS':'Internacional · USD')+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:6px">'
      +'<button class="btn btn-ghost btn-sm" onclick="verH('+h.id+')">Ver</button>'
      +'<button class="btn btn-danger btn-sm" onclick="delH('+h.id+')">X</button>'
      +'</div></div>';
  }).join('');
}
function verH(id){
  var h=getHist().find(function(x){return x.id===id;});
  if(!h) return;
  showTab('resumen');
  $('resumenContent').innerHTML='<p style="font-size:11px;color:#aaa;margin-bottom:10px">Guardada el '+h.fecha+'</p>'+h.html;
}
function delH(id){
  if(!confirm('Eliminar esta cotizacion?')) return;
  saveHist(getHist().filter(function(x){return x.id!==id;}));
  renderHist();
}
function limpiar(){ if(confirm('Limpiar todo?')) location.reload(); }
